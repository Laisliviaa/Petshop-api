<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PetShop API 🐾</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --purple:       #7c3aed;
      --purple-dark:  #5b21b6;
      --purple-mid:   #8b5cf6;
      --purple-light: #c4b5fd;
      --purple-pale:  #ede9fe;
      --purple-ultra: #f5f3ff;
      --lilac:        #f0ebff;
      --white:        #ffffff;
      --text:         #2d1b69;
      --text-mid:     #4c3a8f;
      --muted:        #7c6fa0;
      --border:       #ddd6fe;
      --border-light: #ede9fe;
      --card-bg:      #ffffff;
      --bg:           #f5f3ff;
      --shadow:       0 4px 24px rgba(124,58,237,.10);
      --shadow-hover: 0 12px 40px rgba(124,58,237,.18);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: -1;
      background:
        radial-gradient(ellipse 60% 35% at 95% 0%, rgba(196,181,253,.35) 0%, transparent 65%),
        radial-gradient(ellipse 45% 45% at 0% 100%, rgba(167,139,250,.20) 0%, transparent 65%),
        var(--bg);
    }

    /* ── HEADER ── */
    header {
      padding: 1rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1.5px solid var(--border);
      background: rgba(255,255,255,.85);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 1px 12px rgba(124,58,237,.07);
    }

    .logo { display: flex; align-items: center; gap: .85rem; }
    .logo-icon {
      width: 2.4rem; height: 2.4rem;
      background: linear-gradient(135deg, var(--purple), var(--purple-mid));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      box-shadow: 0 4px 12px rgba(124,58,237,.3);
    }
    .logo h1 { font-size: 1.35rem; font-weight: 800; color: var(--text); line-height: 1; }
    .logo span { font-size: .7rem; color: var(--muted); font-weight: 500; display: block; }

    nav { display: flex; gap: .35rem; flex-wrap: wrap; }
    nav button {
      background: var(--purple-ultra); border: 1.5px solid var(--border);
      border-radius: 10px; padding: .42rem .95rem;
      font-family: 'Nunito', sans-serif; font-size: .82rem; font-weight: 700;
      color: var(--text-mid); cursor: pointer; transition: all .2s;
    }
    nav button:hover { background: var(--purple-pale); border-color: var(--purple-light); color: var(--purple); }
    nav button.active {
      background: var(--purple); border-color: var(--purple); color: #fff;
      box-shadow: 0 4px 12px rgba(124,58,237,.3);
    }

    /* ── MAIN ── */
    main { max-width: 1260px; margin: 0 auto; padding: 2.5rem 1.5rem 5rem; }

    /* ── API KEY BAR ── */
    .apikey-panel {
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: 14px; padding: 1rem 1.4rem;
      margin-bottom: 2rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
      box-shadow: var(--shadow);
    }
    .apikey-panel label { font-size: .8rem; font-weight: 800; color: var(--muted); white-space: nowrap; }
    .apikey-panel input {
      flex: 1; min-width: 180px; padding: .5rem 1rem;
      border: 1.5px solid var(--border); border-radius: 9px;
      font-family: monospace; font-size: .82rem; color: var(--text);
      background: var(--lilac); outline: none; transition: border-color .2s;
    }
    .apikey-panel input:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(124,58,237,.1); }

    /* ── SECTION HEADER ── */
    .section-header {
      display: flex; align-items: flex-end; justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .section-title { font-size: 1.9rem; font-weight: 800; color: var(--text); }
    .section-title em { color: var(--purple); font-style: normal; }

    /* ── SEARCH ── */
    .search-bar { display: flex; gap: .5rem; margin-bottom: 2rem; }
    .search-bar input {
      flex: 1; padding: .68rem 1.1rem;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-family: 'Nunito', sans-serif; font-size: .9rem;
      background: var(--white); color: var(--text); outline: none;
      transition: border-color .2s; box-shadow: 0 2px 8px rgba(124,58,237,.05);
    }
    .search-bar input:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(124,58,237,.1); }
    .search-bar input::placeholder { color: var(--purple-light); }

    .btn-purple {
      background: var(--purple); color: #fff;
      border: none; border-radius: 10px; padding: .68rem 1.3rem;
      font-family: 'Nunito', sans-serif; font-size: .9rem; font-weight: 800;
      cursor: pointer; transition: all .2s; white-space: nowrap;
      box-shadow: 0 4px 12px rgba(124,58,237,.3);
    }
    .btn-purple:hover { background: var(--purple-dark); box-shadow: 0 6px 18px rgba(124,58,237,.4); }
    .btn-purple:active { transform: scale(.97); }

    .btn-outline {
      background: var(--white); color: var(--purple);
      border: 1.5px solid var(--purple); border-radius: 10px; padding: .66rem 1.1rem;
      font-family: 'Nunito', sans-serif; font-size: .9rem; font-weight: 700;
      cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    .btn-outline:hover { background: var(--purple-pale); }

    /* ── CARDS ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 1.2rem;
    }

    .card {
      background: var(--white);
      border: 1.5px solid var(--border-light);
      border-radius: 16px;
      padding: 1.5rem;
      transition: transform .2s, box-shadow .2s, border-color .2s;
      animation: fadeUp .35s ease both;
      position: relative; overflow: hidden;
      box-shadow: var(--shadow);
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, var(--purple), var(--purple-mid));
    }
    .card:hover {
      transform: translateY(-5px);
      border-color: var(--purple-light);
      box-shadow: var(--shadow-hover);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-id { font-size: .7rem; font-weight: 800; letter-spacing: .08em; color: var(--purple); text-transform: uppercase; margin-bottom: .35rem; }
    .card-name { font-size: 1.15rem; font-weight: 800; margin-bottom: .2rem; color: var(--text); }
    .card-sub { font-size: .82rem; color: var(--muted); margin-bottom: .9rem; }
    .card-tags { display: flex; flex-wrap: wrap; gap: .35rem; margin-bottom: .9rem; }

    .tag {
      background: var(--purple-pale); color: var(--purple);
      border: 1px solid var(--purple-light);
      border-radius: 8px; padding: .2rem .7rem; font-size: .72rem; font-weight: 700;
    }
    .tag.green  { background: #f0fdf4; color: #15803d; border-color: #bbf7d0; }
    .tag.yellow { background: #fefce8; color: #a16207; border-color: #fde68a; }
    .tag.blue   { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
    .tag.red    { background: #fef2f2; color: #dc2626; border-color: #fecaca; }

    .card-meta { font-size: .78rem; color: var(--muted); }
    .card-actions { display: flex; gap: .5rem; margin-top: 1.1rem; }
    .btn-sm {
      flex: 1; padding: .45rem .7rem; border-radius: 8px;
      font-size: .78rem; font-weight: 800; font-family: 'Nunito', sans-serif;
      cursor: pointer; transition: all .15s; border: none;
    }
    .btn-sm.edit { background: var(--purple-pale); color: var(--purple); border: 1.5px solid var(--border); }
    .btn-sm.edit:hover { background: var(--purple); color: #fff; border-color: var(--purple); }
    .btn-sm.del  { background: #fef2f2; color: #dc2626; border: 1.5px solid #fecaca; }
    .btn-sm.del:hover { background: #dc2626; color: #fff; border-color: #dc2626; }

    /* ── ESTADO ── */
    .state-msg { text-align: center; padding: 4rem 1rem; color: var(--muted); }
    .state-msg .icon { font-size: 3rem; margin-bottom: .8rem; }
    .state-msg p { font-size: .95rem; }

    /* ── PAGINATION ── */
    .pagination { display: flex; justify-content: center; gap: .4rem; margin-top: 2.5rem; flex-wrap: wrap; }
    .pagination button {
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: 9px; padding: .42rem .88rem;
      font-family: 'Nunito', sans-serif; font-size: .84rem; font-weight: 700;
      color: var(--muted); cursor: pointer; transition: all .2s;
    }
    .pagination button:hover:not(:disabled) { border-color: var(--purple); color: var(--purple); background: var(--purple-pale); }
    .pagination button.current { background: var(--purple); border-color: var(--purple); color: #fff; box-shadow: 0 4px 10px rgba(124,58,237,.3); }
    .pagination button:disabled { opacity: .4; cursor: default; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(45,27,105,.35); backdrop-filter: blur(6px);
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: 20px; padding: 2rem; width: min(500px, 94vw);
      box-shadow: 0 24px 80px rgba(124,58,237,.2);
      animation: modalIn .22s ease; position: relative; max-height: 90vh; overflow-y: auto;
    }
    @keyframes modalIn { from { opacity:0; transform:scale(.95) translateY(10px); } to { opacity:1; transform:none; } }
    .modal-title { font-size: 1.35rem; font-weight: 800; color: var(--purple); margin-bottom: 1.4rem; }
    .modal-close {
      position: absolute; top: 1.1rem; right: 1.1rem;
      background: var(--purple-pale); border: 1.5px solid var(--border); border-radius: 9px;
      width: 2rem; height: 2rem; display: flex; align-items: center; justify-content: center;
      font-size: .9rem; cursor: pointer; color: var(--purple); transition: all .2s;
    }
    .modal-close:hover { background: var(--purple); color: #fff; border-color: var(--purple); }

    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: .8rem; font-weight: 800; color: var(--muted); margin-bottom: .4rem; }
    .form-group input, .form-group select {
      width: 100%; padding: .65rem .95rem;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-family: 'Nunito', sans-serif; font-size: .9rem; color: var(--text);
      background: var(--lilac); outline: none; transition: border-color .2s;
    }
    .form-group input:focus, .form-group select:focus {
      border-color: var(--purple); box-shadow: 0 0 0 3px rgba(124,58,237,.1);
      background: var(--white);
    }
    .modal-actions { display: flex; gap: .6rem; margin-top: 1.4rem; }

    /* ── AUTH ── */
    .auth-grid { display: flex; gap: 1.4rem; flex-wrap: wrap; align-items: flex-start; }
    .auth-card {
      flex: 1; min-width: 280px;
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: 18px; padding: 1.8rem; position: relative; overflow: hidden;
      box-shadow: var(--shadow);
    }
    .auth-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, var(--purple), var(--purple-mid));
    }
    .auth-card-title { font-size: 1.2rem; font-weight: 800; color: var(--text); margin-bottom: .35rem; }
    .auth-card-desc { font-size: .84rem; color: var(--muted); line-height: 1.6; margin-bottom: 1.2rem; }

    .key-result-label { font-size: .76rem; font-weight: 800; color: var(--muted); margin-bottom: .4rem; margin-top: 1rem; }
    .key-result-box {
      display: flex; align-items: center; gap: .5rem;
      background: var(--lilac); border: 1.5px solid var(--border); border-radius: 10px; padding: .55rem .9rem;
    }
    .key-result-box code { flex: 1; font-size: .76rem; color: var(--purple); word-break: break-all; font-family: monospace; font-weight: 700; }
    .btn-copy { background: none; border: none; cursor: pointer; font-size: 1rem; padding: .2rem; color: var(--muted); border-radius: 6px; transition: all .15s; }
    .btn-copy:hover { background: var(--purple-pale); color: var(--purple); }

    /* Keys table */
    .keys-table { width: 100%; border-collapse: collapse; font-size: .83rem; }
    .keys-table th {
      text-align: left; padding: .6rem .75rem; font-weight: 800; color: var(--muted);
      font-size: .72rem; text-transform: uppercase; letter-spacing: .06em;
      border-bottom: 1.5px solid var(--border);
    }
    .keys-table td { padding: .75rem .75rem; border-bottom: 1px solid var(--border-light); vertical-align: middle; }
    .keys-table tr:last-child td { border-bottom: none; }
    .keys-table tr:hover td { background: var(--purple-ultra); }

    .badge { display: inline-block; border-radius: 7px; padding: .18rem .65rem; font-size: .7rem; font-weight: 800; }
    .badge.ativo   { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
    .badge.inativo { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .badge.ADMIN       { background: var(--purple-pale); color: var(--purple); border: 1px solid var(--border); }
    .badge.FUNCIONARIO { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
    .badge.VISITANTE   { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
    .key-mono { font-family: monospace; font-size: .75rem; color: var(--muted); }

    .btn-del {
      background: #fef2f2; color: #dc2626; border: 1.5px solid #fecaca;
      border-radius: 7px; padding: .28rem .8rem; font-size: .73rem; font-weight: 800;
      cursor: pointer; transition: all .15s; font-family: 'Nunito', sans-serif;
    }
    .btn-del:hover { background: #dc2626; color: #fff; border-color: #dc2626; }

    .btn-usar {
      background: var(--purple-pale); color: var(--purple); border: 1.5px solid var(--border);
      border-radius: 7px; padding: .28rem .8rem; font-size: .73rem; font-weight: 800;
      cursor: pointer; transition: all .15s; font-family: 'Nunito', sans-serif;
    }
    .btn-usar:hover { background: var(--purple); color: #fff; border-color: var(--purple); }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 500;
      background: var(--white); color: var(--text);
      border: 1.5px solid var(--border);
      border-radius: 12px; padding: .85rem 1.4rem;
      font-size: .86rem; font-weight: 700;
      box-shadow: 0 8px 32px rgba(124,58,237,.18);
      transition: opacity .3s, transform .3s;
      opacity: 0; transform: translateY(10px); pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { background: #f0fdf4; border-color: #86efac; color: #15803d; }
    #toast.error   { background: #fef2f2; border-color: #fca5a5; color: #dc2626; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🐾</div>
    <div>
      <h1>PetShop API</h1>
      <span>Explorer v2.0</span>
    </div>
  </div>
  <nav>
    <button class="active" onclick="goTo('clientes')">👤 Clientes</button>
    <button onclick="goTo('pets')">🐶 Pets</button>
    <button onclick="goTo('agendamentos')">📅 Agendamentos</button>
    <button onclick="goTo('servicos')">✂️ Serviços</button>
    <button onclick="goTo('unidades')">🏥 Unidades</button>
    <button onclick="goTo('gerentes')">👔 Gerentes</button>
    <button onclick="goTo('auth')">🔑 Auth</button>
  </nav>
</header>

<main>
  <div class="apikey-panel" id="apikeyBar">
    <label>🔑 X-API-Key ativa</label>
    <input id="apiKeyInput" type="text" placeholder="Vá em Auth para gerar ou usar uma chave…" readonly />
    <button class="btn-outline" onclick="goTo('auth')">Gerenciar →</button>
  </div>

  <!-- Auth Section -->
  <div id="authSection" style="display:none">
    <div class="section-header" style="margin-bottom:1.8rem">
      <div class="section-title">Gerenciar <em>Auth</em></div>
    </div>
    <div class="auth-grid">
      <div class="auth-card">
        <div style="font-size:1.8rem;margin-bottom:.6rem">🗝️</div>
        <h3 class="auth-card-title">Gerar nova chave</h3>
        <p class="auth-card-desc">Crie uma API Key para autenticar requisições de escrita (POST, PUT, DELETE).</p>
        <div class="form-group">
          <label>Responsável *</label>
          <input id="reg_owner" type="text" placeholder="Ex: Lais" />
        </div>
        <div class="form-group">
          <label>Role</label>
          <select id="reg_role">
            <option value="VISITANTE">VISITANTE — só consultar (GET)</option>
            <option value="FUNCIONARIO">FUNCIONARIO — cadastrar e editar (GET+POST+PUT)</option>
            <option value="ADMIN">ADMIN — acesso total incluindo exclusão</option>
          </select>
        </div>
        <button class="btn-purple" style="width:100%" onclick="registrar()">Gerar chave 🗝️</button>
        <div id="reg_result" style="display:none">
          <div class="key-result-label">Sua chave (copie agora!):</div>
          <div class="key-result-box">
            <code id="reg_keyValue"></code>
            <button class="btn-copy" onclick="copiarChave()" title="Copiar">📋</button>
          </div>
          <button class="btn-outline" style="width:100%;margin-top:.8rem" onclick="usarChave()">Usar esta chave agora</button>
        </div>
      </div>

      <div class="auth-card" style="flex:2">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem">
          <div>
            <span style="font-size:1.4rem">🛡️</span>
            <span class="auth-card-title" style="margin-left:.5rem">Chaves cadastradas</span>
          </div>
          <button class="btn-outline" onclick="carregarChaves()" style="font-size:.78rem;padding:.38rem .9rem">↻ Atualizar</button>
        </div>
        <div id="keysTable">
          <div class="state-msg"><div class="icon">🔑</div><p>Clique em Atualizar para carregar.</p></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Normal sections -->
  <div id="normalSection">
    <div class="section-header">
      <h2 class="section-title" id="sectionTitle"><em>Clientes</em></h2>
      <button class="btn-purple" onclick="abrirModal()">+ Novo</button>
    </div>
    <div class="search-bar">
      <input id="searchInput" type="text" placeholder="Buscar…" />
      <button class="btn-purple" onclick="buscar()">Buscar</button>
      <button class="btn-outline" onclick="resetBusca()">Limpar</button>
    </div>
    <div id="content">
      <div class="state-msg"><div class="icon">🐾</div><p>Carregando…</p></div>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" onclick="fecharModal()">✕</button>
    <div class="modal-title" id="modalTitle">Novo registro</div>
    <div id="modalForm"></div>
    <div class="modal-actions">
      <button class="btn-purple" onclick="salvar()" style="flex:1">Salvar</button>
      <button class="btn-outline" onclick="fecharModal()">Cancelar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const BASE = window.location.origin;
  let currentSection = 'clientes', currentPage = 0, totalPages = 1, editingId = null, searchTerm = '';

  const sectionConfig = {
    clientes:     { title: '<em>Clientes</em>',    path: '/api/v1/clientes',    fields: clienteFields,     body: clienteBody,     render: renderCliente },
    pets:         { title: '<em>Pets</em>',         path: '/api/v1/pets',         fields: petFields,         body: petBody,         render: renderPet },
    agendamentos: { title: '<em>Agendamentos</em>', path: '/api/v1/agendamentos', fields: agendamentoFields, body: agendamentoBody, render: renderAgendamento },
    servicos:     { title: '<em>Serviços</em>',     path: '/api/v1/servicos',     fields: servicoFields,     body: servicoBody,     render: renderServico },
    unidades:     { title: '<em>Unidades</em>',     path: '/api/v1/unidades',     fields: unidadeFields,     body: unidadeBody,     render: renderUnidade },
    gerentes:     { title: '<em>Gerentes</em>',     path: '/api/v1/gerentes',     fields: gerenteFields,     body: gerenteBody,     render: renderGerente },
  };

  const sections = ['clientes','pets','agendamentos','servicos','unidades','gerentes','auth'];

  function apiKey() { return document.getElementById('apiKeyInput').value.trim(); }

  async function req(path, method='GET', body=null) {
    const headers = { 'Content-Type': 'application/json', 'X-API-Version': '1' };
    if (apiKey()) headers['X-API-Key'] = apiKey();
    if (method === 'POST') headers['X-Idempotency-Key'] = crypto.randomUUID();
    const res = await fetch(BASE + path, { method, headers, body: body ? JSON.stringify(body) : undefined });
    if (res.status === 204) return null;
    const data = await res.json().catch(() => null);
    if (!res.ok) {
      const msg = data?.mensagem || data?.message || data?.erro || `Erro ${res.status}`;
      throw new Error(msg);
    }
    return data;
  }

  function goTo(section) {
    currentSection = section; currentPage = 0; searchTerm = '';
    document.getElementById('searchInput') && (document.getElementById('searchInput').value = '');
    document.querySelectorAll('nav button').forEach((b,i) => b.classList.toggle('active', sections[i] === section));
    const isAuth = section === 'auth';
    document.getElementById('authSection').style.display   = isAuth ? 'block' : 'none';
    document.getElementById('apikeyBar').style.display     = isAuth ? 'none'  : 'flex';
    document.getElementById('normalSection').style.display = isAuth ? 'none'  : 'block';
    if (isAuth) { carregarChaves(); return; }
    document.getElementById('sectionTitle').innerHTML = sectionConfig[section].title;
    loadData();
  }

  async function loadData() {
    const cfg = sectionConfig[currentSection];
    const content = document.getElementById('content');
    content.innerHTML = '<div class="state-msg"><div class="icon">🐾</div><p>Carregando…</p></div>';
    try {
      const data = await req(cfg.path + `?page=${currentPage}&size=9&sort=id,asc`);
      const items = data?._embedded ? Object.values(data._embedded)[0]
                  : (Array.isArray(data.content) ? data.content : (Array.isArray(data) ? data : []));
      totalPages = data?.page?.totalPages ?? 1;
      if (!items || !items.length) {
        content.innerHTML = '<div class="state-msg"><div class="icon">🔍</div><p>Nenhum resultado encontrado.</p></div>';
        document.getElementById('pagination').innerHTML = ''; return;
      }
      content.innerHTML = `<div class="cards-grid">${items.map(cfg.render).join('')}</div>`;
      renderPagination();
    } catch(e) {
      content.innerHTML = `<div class="state-msg"><div class="icon">😿</div><p>${e.message}</p></div>`;
    }
  }

  function renderPagination() {
    const el = document.getElementById('pagination');
    if (totalPages <= 1) { el.innerHTML = ''; return; }
    let html = `<button ${currentPage===0?'disabled':''} onclick="changePage(${currentPage-1})">← Anterior</button>`;
    for (let i=0; i<totalPages; i++) {
      if (i<2||i>=totalPages-2||Math.abs(i-currentPage)<=1)
        html += `<button class="${i===currentPage?'current':''}" onclick="changePage(${i})">${i+1}</button>`;
      else if (i===2||i===totalPages-3) html += `<button disabled>…</button>`;
    }
    html += `<button ${currentPage>=totalPages-1?'disabled':''} onclick="changePage(${currentPage+1})">Próxima →</button>`;
    el.innerHTML = html;
  }
  function changePage(p) { currentPage = p; loadData(); }

  function buscar() { searchTerm = document.getElementById('searchInput').value.trim(); currentPage = 0; loadData(); }
  function resetBusca() { searchTerm = ''; document.getElementById('searchInput').value = ''; currentPage = 0; loadData(); }
  document.getElementById('searchInput').addEventListener('keydown', e => { if(e.key==='Enter') buscar(); });

  async function registrar() {
    const owner = document.getElementById('reg_owner').value.trim();
    const role  = document.getElementById('reg_role').value;
    if (!owner) { toast('Informe o nome do responsável!', 'error'); return; }
    try {
      const data = await req('/api/v1/apikeys', 'POST', { clientName: owner, role });
      document.getElementById('reg_keyValue').textContent = data.apiKey || data.keyValue || '';
      document.getElementById('reg_result').style.display = 'block';
      toast('Chave gerada com sucesso! 🗝️', 'success');
      carregarChaves();
    } catch(e) { toast(e.message, 'error'); }
  }

  function copiarChave() {
    navigator.clipboard.writeText(document.getElementById('reg_keyValue').textContent)
      .then(() => toast('Chave copiada! 📋', 'success'));
  }
  function usarChave() {
    document.getElementById('apiKeyInput').value = document.getElementById('reg_keyValue').textContent;
    toast('Chave definida como ativa! 🐾', 'success');
    goTo('clientes');
  }

  async function carregarChaves() {
    const el = document.getElementById('keysTable');
    el.innerHTML = '<div class="state-msg"><div class="icon">🐾</div><p>Carregando…</p></div>';
    try {
      const keys = await req('/api/v1/apikeys');
      if (!keys.length) { el.innerHTML = '<div class="state-msg"><div class="icon">🔑</div><p>Nenhuma chave cadastrada.</p></div>'; return; }
      el.innerHTML = `<table class="keys-table">
        <thead><tr><th>#</th><th>Responsável</th><th>Chave</th><th>Role</th><th>Status</th><th>Criada</th><th>Ações</th></tr></thead>
        <tbody>${keys.map(k => `<tr>
          <td>${k.id}</td>
          <td><strong>${k.clientName}</strong></td>
          <td><span class="key-mono">${(k.apiKey||k.keyValue||'').substring(0,20)}…</span></td>
          <td><span class="badge ${k.role}">${k.role}</span></td>
          <td><span class="badge ${k.active?'ativo':'inativo'}">${k.active?'Ativa':'Revogada'}</span></td>
          <td>${k.createdAt ? new Date(k.createdAt).toLocaleDateString('pt-BR') : '—'}</td>
          <td style="display:flex;gap:.4rem;flex-wrap:wrap">
            ${k.active
              ? `<button class="btn-usar" onclick="aplicarChave('${k.apiKey||k.keyValue||''}')">Usar</button>
                 <button class="btn-del" onclick="deletarChave(${k.id})">Excluir</button>`
              : '<span style="color:var(--muted);font-size:.75rem">—</span>'}
          </td>
        </tr>`).join('')}</tbody></table>`;
    } catch(e) { el.innerHTML = `<div class="state-msg"><div class="icon">😿</div><p>${e.message}</p></div>`; }
  }

  function aplicarChave(key) { document.getElementById('apiKeyInput').value = key; toast('Chave ativa definida! 🐾', 'success'); }
  async function deletarChave(id) {
    if (!confirm('Excluir esta chave permanentemente? Essa ação não pode ser desfeita.')) return;
    try { await req('/api/v1/apikeys/' + id, 'DELETE'); toast('Chave excluída!', 'success'); carregarChaves(); }
    catch(e) { toast(e.message, 'error'); }
  }

  // ── RENDER ──
  function renderCliente(c) {
    return `<div class="card">
      <div class="card-id">#${c.id} · Cliente</div>
      <div class="card-name">${c.nome}</div>
      <div class="card-sub">📄 ${c.cpf || '—'}</div>
      <div class="card-tags"><span class="tag blue">🐾 ${c.totalPets ?? 0} pet(s)</span></div>
      <div class="card-actions">
        <button class="btn-sm edit" onclick="abrirModal(${c.id})">Editar</button>
        <button class="btn-sm del"  onclick="deletar(${c.id})">Deletar</button>
      </div>
    </div>`;
  }
  function renderPet(p) {
    const tagEsp = p.especie === 'Cachorro' ? '<span class="tag yellow">🐕 Cachorro</span>'
                 : p.especie === 'Gato' ? '<span class="tag blue">🐱 Gato</span>'
                 : `<span class="tag">${p.especie||'—'}</span>`;
    return `<div class="card">
      <div class="card-id">#${p.id} · Pet</div>
      <div class="card-name">${p.nome}</div>
      <div class="card-sub">${p.nomeCliente ? '👤 ' + p.nomeCliente : '—'}</div>
      <div class="card-tags">${tagEsp}${p.totalServicos?`<span class="tag green">✂️ ${p.totalServicos} serviço(s)</span>`:''}</div>
      <div class="card-actions">
        <button class="btn-sm edit" onclick="abrirModal(${p.id})">Editar</button>
        <button class="btn-sm del"  onclick="deletar(${p.id})">Deletar</button>
      </div>
    </div>`;
  }
  function renderAgendamento(a) {
    const dt = a.dataHora ? new Date(a.dataHora).toLocaleString('pt-BR') : '—';
    const sc = { PENDENTE:'yellow', CONCLUIDO:'green', CANCELADO:'red' };
    return `<div class="card">
      <div class="card-id">#${a.id} · Agendamento</div>
      <div class="card-name">${a.nomePet || 'Pet #?'}</div>
      <div class="card-sub">📅 ${dt}</div>
      <div class="card-tags">
        <span class="tag ${sc[a.status]||''}">${a.status||'—'}</span>
        ${a.nomeServico ? `<span class="tag blue">✂️ ${a.nomeServico}</span>` : ''}
        ${a.nomeUnidade ? `<span class="tag">${a.nomeUnidade}</span>` : ''}
      </div>
      ${a.observacoes ? `<div class="card-meta">📝 ${a.observacoes}</div>` : ''}
      <div class="card-actions">
        <button class="btn-sm edit" onclick="abrirModal(${a.id})">Editar</button>
        <button class="btn-sm del"  onclick="deletar(${a.id})">Deletar</button>
      </div>
    </div>`;
  }
  function renderServico(s) {
    return `<div class="card">
      <div class="card-id">#${s.id} · Serviço</div>
      <div class="card-name">${s.descricao}</div>
      <div class="card-sub"></div>
      <div class="card-tags"><span class="tag green">💰 R$ ${Number(s.preco||0).toFixed(2)}</span></div>
      <div class="card-actions">
        <button class="btn-sm edit" onclick="abrirModal(${s.id})">Editar</button>
        <button class="btn-sm del"  onclick="deletar(${s.id})">Deletar</button>
      </div>
    </div>`;
  }
  function renderUnidade(u) {
    return `<div class="card">
      <div class="card-id">#${u.id} · Unidade</div>
      <div class="card-name">${u.nome}</div>
      <div class="card-sub">📍 ${u.endereco||'—'}</div>
      <div class="card-tags"></div>
      <div class="card-actions">
        <button class="btn-sm edit" onclick="abrirModal(${u.id})">Editar</button>
        <button class="btn-sm del"  onclick="deletar(${u.id})">Deletar</button>
      </div>
    </div>`;
  }
  function renderGerente(g) {
    return `<div class="card">
      <div class="card-id">#${g.id} · Gerente</div>
      <div class="card-name">${g.nome}</div>
      <div class="card-sub">${g.nomeUnidade ? '🏥 ' + g.nomeUnidade : '—'}</div>
      <div class="card-tags"></div>
      <div class="card-actions">
        <button class="btn-sm edit" onclick="abrirModal(${g.id})">Editar</button>
        <button class="btn-sm del"  onclick="deletar(${g.id})">Deletar</button>
      </div>
    </div>`;
  }

  // ── FORMS ──
  function clienteFields(d={}) { return `
    <div class="form-group"><label>Nome *</label><input id="f_nome" value="${d.nome||''}" placeholder="Carlos Lima" /></div>
    <div class="form-group"><label>CPF * <small style="font-weight:400;color:var(--muted)">(somente números, 11 dígitos)</small></label><input id="f_cpf" type="text" inputmode="numeric" maxlength="11" pattern="\d{11}" value="${d.cpf||''}" placeholder="12345678901" oninput="this.value=this.value.replace(/\D/g,'').substring(0,11)" /></div>
  `;}
  function clienteBody() { return { nome: v('f_nome'), cpf: v('f_cpf').replace(/\D/g,'').substring(0,11) }; }

  async function petFields(d={}) {
    const clientes = await req('/api/v1/clientes?size=100').catch(()=>({_embedded:{clienteResponseList:[]}}));
    const lista = clientes?._embedded?.clienteResponseList || [];
    const opts = lista.map(c => `<option value="${c.id}" ${d.clienteId==c.id?'selected':''}>${c.nome} (CPF: ${c.cpf})</option>`).join('');
    return `
    <div class="form-group"><label>Nome *</label><input id="f_nome" value="${d.nome||''}" placeholder="Rex" /></div>
    <div class="form-group"><label>Espécie</label><input id="f_especie" value="${d.especie||''}" placeholder="Cachorro" /></div>
    <div class="form-group"><label>Cliente *</label><select id="f_clienteId"><option value="">Selecione...</option>${opts}</select></div>
  `;}
  function petBody() { const cId=v('f_clienteId'); return { nome:v('f_nome'), especie:v('f_especie'), clienteId:cId?Number(cId):null }; }

  async function agendamentoFields(d={}) {
    const dt = d.dataHora ? d.dataHora.substring(0,16) : '';
    const [pets, servicos, unidades] = await Promise.all([
      req('/api/v1/pets?size=100').catch(()=>({_embedded:{petResponseList:[]}})),
      req('/api/v1/servicos?size=100').catch(()=>({_embedded:{servicoResponseList:[]}})),
      req('/api/v1/unidades?size=100').catch(()=>({_embedded:{unidadeResponseList:[]}}))
    ]);
    const optsPets = (pets?._embedded?.petResponseList||[]).map(p=>`<option value="${p.id}" ${d.petId==p.id?'selected':''}>${p.nome} (${p.especie})</option>`).join('');
    const optsServicos = (servicos?._embedded?.servicoResponseList||[]).map(s=>`<option value="${s.id}" ${d.servicoId==s.id?'selected':''}>${s.descricao} — R$ ${s.preco}</option>`).join('');
    const optsUnidades = (unidades?._embedded?.unidadeResponseList||[]).map(u=>`<option value="${u.id}" ${d.unidadeId==u.id?'selected':''}>${u.nome}</option>`).join('');
    return `
    <div class="form-group"><label>Pet *</label><select id="f_petId"><option value="">Selecione...</option>${optsPets}</select></div>
    <div class="form-group"><label>Serviço *</label><select id="f_servicoId"><option value="">Selecione...</option>${optsServicos}</select></div>
    <div class="form-group"><label>Unidade *</label><select id="f_unidadeId"><option value="">Selecione...</option>${optsUnidades}</select></div>
    <div class="form-group"><label>Data e hora *</label><input id="f_dataHora" type="datetime-local" value="${dt}" /></div>
    <div class="form-group"><label>Status</label>
      <select id="f_status">${['PENDENTE','CONCLUIDO','CANCELADO'].map(s=>`<option ${d.status===s?'selected':''}>${s}</option>`).join('')}</select>
    </div>
    <div class="form-group"><label>Observações</label><input id="f_observacoes" value="${d.observacoes||''}" placeholder="Ex: Animal agitado, cuidado ao tosiar" /></div>
  `;}
  function agendamentoBody() {
    const pId=v('f_petId'); const sId=v('f_servicoId'); const uId=v('f_unidadeId');
    return {
      petId:     pId ? Number(pId) : null,
      servicoId: sId ? Number(sId) : null,
      unidadeId: uId ? Number(uId) : null,
      dataHora: v('f_dataHora'),
      status: v('f_status'),
      observacoes: v('f_observacoes') || null
    };
  }

  function servicoFields(d={}) { return `
    <div class="form-group"><label>Descrição *</label><input id="f_descricao" value="${d.descricao||''}" placeholder="Banho e Tosa" /></div>
    <div class="form-group"><label>Preço (R$) *</label><input id="f_preco" type="number" step="0.01" value="${d.preco||''}" placeholder="80.00" /></div>
  `;}
  function servicoBody() { return { descricao:v('f_descricao'), preco:Number(v('f_preco')) }; }

  function unidadeFields(d={}) { return `
    <div class="form-group"><label>Nome *</label><input id="f_nome" value="${d.nome||''}" placeholder="Unidade Centro" /></div>
    <div class="form-group"><label>Endereço</label><input id="f_endereco" value="${d.endereco||''}" placeholder="Rua das Flores, 100" /></div>
  `;}
  function unidadeBody() { return { nome:v('f_nome'), endereco:v('f_endereco') }; }

  async function gerenteFields(d={}) {
    const unidades = await req('/api/v1/unidades?size=100').catch(()=>({_embedded:{unidadeResponseList:[]}}));
    const opts = (unidades?._embedded?.unidadeResponseList||[]).map(u=>`<option value="${u.id}" ${d.unidadeId==u.id?'selected':''}>${u.nome}</option>`).join('');
    return `
    <div class="form-group"><label>Nome *</label><input id="f_nome" value="${d.nome||''}" placeholder="João Silva" /></div>
    <div class="form-group"><label>Unidade *</label><select id="f_unidadeId"><option value="">Selecione...</option>${opts}</select></div>
  `;}
  function gerenteBody() { const uId=v('f_unidadeId'); return { nome:v('f_nome'), unidadeId:uId?Number(uId):null }; }

  function v(id) { return document.getElementById(id)?.value || ''; }

  // ── MODAL ──
  async function abrirModal(id=null) {
    editingId = id;
    const cfg = sectionConfig[currentSection];
    document.getElementById('modalTitle').textContent = id ? 'Editar registro' : 'Novo registro';
    let data = {};
    if (id) { try { data = await req(cfg.path + '/' + id); } catch(e) {} }
    document.getElementById('modalForm').innerHTML = await cfg.fields(data);
    document.getElementById('modalOverlay').classList.add('open');
  }
  function fecharModal() { document.getElementById('modalOverlay').classList.remove('open'); editingId = null; }
  document.getElementById('modalOverlay').addEventListener('click', e => { if(e.target===e.currentTarget) fecharModal(); });

  async function salvar() {
    const cfg = sectionConfig[currentSection];
    const body = cfg.body();
    try {
      if (editingId) { await req(cfg.path + '/' + editingId, 'PUT', body); toast('Atualizado com sucesso! ✅', 'success'); }
      else           { await req(cfg.path, 'POST', body); toast('Criado com sucesso! 🐾', 'success'); }
      fecharModal(); loadData();
    } catch(e) { toast(e.message, 'error'); }
  }

  async function deletar(id) {
    if (!confirm('Tem certeza? Essa ação não pode ser desfeita.')) return;
    try { await req(sectionConfig[currentSection].path + '/' + id, 'DELETE'); toast('Deletado!', 'success'); loadData(); }
    catch(e) { toast(e.message, 'error'); }
  }

  function toast(msg, type='') {
    const el = document.getElementById('toast');
    el.textContent = msg; el.className = `show ${type}`;
    clearTimeout(el._t);
    el._t = setTimeout(() => el.className = '', 3200);
  }

  goTo('clientes');
</script>
</body>
</html>
